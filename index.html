<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NACSA Act 854 Explorer</title>
  <meta name="description" content="Interactive browser for Malaysia's Cyber Security Act 2024 (Act 854) — explore provisions, NCII sectors, requirements, evidence guidance, controls, penalties, and cross-references.">
  <meta property="og:title" content="NACSA Cyber Security Act 2024 (Act 854) Compliance Framework">
  <meta property="og:description" content="Malaysia National Cyber Security Agency Act 854 compliance reference with 64 provisions, controls, evidence, risk management, and sector requirements">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header" id="site-header">
    <div class="header-inner">
      <a href="#" class="header-brand" title="Home">
        <h1>NACSA Act 854 Explorer</h1>
        <span class="header-subtitle">Cyber Security Act 2024 (Act 854)</span>
      </a>
      <div class="header-search">
        <input type="text" id="search-input" aria-label="Search compliance data" placeholder="Search provisions, sectors, penalties…" autocomplete="off">
      </div>
    </div>
  </header>
  <nav class="nav" id="site-nav">
    <div class="nav-inner">
      <a href="#" class="nav-link active" data-view="overview">Overview</a>
      <a href="#framework" class="nav-link" data-view="framework">Framework</a>
      <a href="#controls" class="nav-link" data-view="controls">Controls</a>
      <a href="#risk" class="nav-link" data-view="risk">Risk Management</a>
      <a href="#sectors" class="nav-link" data-view="sectors">Sectors</a>
      <a href="#reference" class="nav-link" data-view="reference">Reference</a>

      <div class="nav-actions">
        <button onclick="exportToPDF()" class="btn-export">PDF</button>
        <button onclick="exportToCSV()" class="btn-export">CSV</button>
      </div>
    </div>
  </nav>
  <div id="app">
    <noscript>This application requires JavaScript to run. Please enable JavaScript in your browser settings.</noscript>
    <div class="loading">
      <div class="spinner"></div>
      <span>Loading Act 854 data…</span>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
