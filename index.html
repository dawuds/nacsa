<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NACSA Act 854 Explorer</title>
  <meta name="description" content="Interactive browser for Malaysia's Cyber Security Act 2024 (Act 854) — explore provisions, NCII sectors, requirements, evidence guidance, controls, penalties, and cross-references.">
  <meta property="og:title" content="NACSA Cyber Security Act 2024 (Act 854) Compliance Framework">

  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <header class="header" id="site-header">

      <a href="#" class="header-brand">

  <nav class="nav" id="site-nav">
    <div class="nav-inner">
      <a href="#" class="nav-link active" data-view="overview">Overview</a>

      <a href="#supplements" class="nav-link" data-view="supplements">Supplements</a>
      <a href="#cross-references" class="nav-link" data-view="cross-references">Cross-Refs</a>
      <a href="#risk-management" class="nav-link" data-view="risk-management">Risk Mgmt</a>
    </div>
  </nav>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <span>Loading Act 854 data…</span>

  <script src="app.js"></script>
